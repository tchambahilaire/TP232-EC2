<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erreur {{ error_code }} - Agri-Stat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background: #F1F8E9;">
    <div class="container text-center mt-5 pt-5">
        <div class="card shadow">
            <div class="card-body p-5">
                <h1 class="display-1 text-danger">{{ error_code }}</h1>
                <h3 class="mb-4">{{ error_message }}</h3>
                <p class="text-muted">{{ suggestion }}</p>
                <a href="/" class="btn btn-success btn-lg mt-3"><i class="bi bi-house me-2"></i>Retour à l'accueil</a>
            </div>
        </div>
    </div>
</body>
</html>
